# Scene to test Cylinders and Cones
camera = 
{
  resolution = { width = 1280; height = 720 };
  position = { x = 0.0; y = 2.0; z = 10.0 }; # Camera looking towards -Z, slightly elevated
  rotation = { x = -10.0; y = 0.0; z = 0.0 }; # Slightly tilted down
  fieldOfView = 60.0;
};

primitives = 
{
  spheres = (
    {
      # A small sphere for reference
      x = -3.0; 
      y = 0.5; 
      z = -2.0; 
      r = 0.5; 
      color = { r = 100; g = 100; b = 100 } # Grey
    }
  );
  
  planes = (
    {
      axis = "Y"; # Floor plane
      position = 0.0;
      color = { r = 80; g = 70; b = 60 } # Brownish floor
    }
  );

  cylinders = (
    {
      axisPoint = { x = -1.5; y = 0.0; z = -3.0 };
      axisDirection = { x = 0.0; y = 1.0; z = 0.0 }; # Along Y axis (vertical)
      radius = 0.75;
      color = { r = 200; g = 50; b = 50 }; # Reddish cylinder
    },
    {
      axisPoint = { x = 1.5; y = 0.5; z = -4.0 };
      axisDirection = { x = 1.0; y = 0.0; z = 0.0 }; # Along X axis (horizontal)
      radius = 0.4;
      color = { r = 50; g = 200; b = 50 }; # Greenish cylinder
    }
  );

  cones = (
    {
      tip = { x = 0.0; y = 3.0; z = -6.0 }; # Tip high up
      axisDirection = { x = 0.0; y = -1.0; z = 0.0 }; # Pointing downwards
      angle = 25.0; # Degrees
      color = { r = 50; g = 50; b = 200 }; # Bluish cone
    },
    {
      tip = { x = 3.0; y = 0.0; z = -5.0 }; # Tip on the floor plane
      axisDirection = { x = 0.0; y = 1.0; z = 0.0 }; # Pointing upwards
      angle = 35.0; # Degrees
      color = { r = 200; g = 200; b = 50 }; # Yellowish cone
    }
  );
};

lights = 
{
  ambient = 0.2;
  diffuse = 0.8;
  
  directional = (
    { x = 1.0; y = -1.0; z = -1.0 }, # Main light from top-right-front
    { x = -0.5; y = -0.5; z = 1.0; color = {r=50; g=50; b=100} } # Secondary fill light from left-backish, bluish
  );
}; 