# Scene to test one sphere casting a shadow on another sphere
camera = 
{
  resolution = { width = 1280; height = 720 };
  position = { x = 0.0; y = 1.0; z = 5.0 }; # Camera looking towards -Z
  rotation = { x = 0.0; y = 0.0; z = 0.0 };
  fieldOfView = 60.0;
};

primitives = 
{
  spheres = (
    { 
      # Sphere that gets a shadow cast on it (larger, further away)
      x = 0.0; 
      y = 0.0; 
      z = -5.0; 
      r = 2.0; 
      color = { r = 100; g = 100; b = 255 } # Light blue
    },
    { 
      # Sphere that casts the shadow (smaller, closer to light)
      x = -1.5; 
      y = 0.5; 
      z = -2.0; 
      r = 0.75; 
      color = { r = 255; g = 200; b = 0 } # Yellow
    }
  );
  
  planes = (
    { # Optional background plane, far away
      axis = "Z";
      position = -20.0;
      color = { r = 50; g = 50; b = 50 } # Dark grey
    }
  );
};

lights = 
{
  ambient = 0.15;
  diffuse = 0.85;
  
  # Light coming from the right and slightly above, angled towards the spheres
  directional = (
    { x = -1.0; y = 0.5; z = -1.0 } 
  );
}; 