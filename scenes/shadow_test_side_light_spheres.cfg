# Scene to test elongated shadows from multiple spheres with a side light
camera = 
{
  resolution = { width = 1920; height = 1080 }; # Higher resolution
  position = { x = 0.0; y = 5.0; z = 8.0 }; # Higher and further back camera
  rotation = { x = -25.0; y = 0.0; z = 0.0 }; # Angled more downwards
  fieldOfView = 50.0;
};

primitives = 
{
  spheres = (
    { 
      x = -2.0; 
      y = 1.0; 
      z = -2.0; 
      r = 1.0; 
      color = { r = 200; g = 50; b = 50 } # Reddish
    },
    { 
      x = 0.0; 
      y = 0.5; 
      z = -1.0; 
      r = 0.5; 
      color = { r = 50; g = 200; b = 50 } # Greenish
    },
    { 
      x = 2.5; 
      y = 1.5; 
      z = -3.0; 
      r = 1.5; 
      color = { r = 50; g = 50; b = 200 } # Bluish
    }
  );
  
  planes = (
    {
      axis = "Y"; # Floor plane
      position = 0.0;
      color = { r = 120; g = 100; b = 80 } # Brownish/earthy tone
    }
  );
};

lights = 
{
  ambient = 0.1;
  diffuse = 0.9;
  
  # Light coming strongly from the side and slightly from the front/above
  directional = (
    { x = -1.0; y = -0.2; z = -0.3 } # Light from left, slightly above, slightly front
  );
}; 