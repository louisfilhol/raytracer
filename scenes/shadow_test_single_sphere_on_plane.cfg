# Scene to test a single sphere casting a shadow on a plane
camera = 
{
  resolution = { width = 1280; height = 720 };
  position = { x = 0.0; y = 2.0; z = 5.0 }; # Moved camera back and up for a better view
  rotation = { x = -10.0; y = 0.0; z = 0.0 }; # Tilted camera down slightly
  fieldOfView = 60.0;
};

primitives = 
{
  spheres = (
    { 
      x = 0.0; 
      y = 1.0; # Sphere slightly elevated
      z = -2.0; 
      r = 1.0; 
      color = { r = 255; g = 100; b = 100 } # Light red
    }
  );
  
  planes = (
    {
      axis = "Y"; # Plane is now the "floor"
      position = 0.0; # At y=0
      color = { r = 150; g = 150; b = 150 } # Grey
    }
  );
};

lights = 
{
  ambient = 0.2;
  diffuse = 0.8;
  
  # Light coming from above and slightly to the side/front
  directional = (
    { x = 0.5; y = -1.0; z = -0.5 } 
  );
}; 